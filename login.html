 <style>
 *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

 :root {
 --clay: #8B6F5E;
 --clay-dk: #5C4033;
 --clay-lt: #D4A574;
 --sand: #F5F0EA;
 --sand-dk: #E8E0D4;
 --ink: #2A1F1A;
 --ink-mid: #3D2B1F;
 --ink-soft: #8B6F5E;
 --teal: #8B6F5E;
 --teal-dk: #5C4033;
 --rose: #A0522D;
 --rose-dk: #5C4033;
 --sky: #8B6F5E;
 --gold: #D4A574;
 --green: #7A9A6A;
 --white: #F5F0EA;
 --border: #D4C4B0;
 --shadow: rgba(60,35,20,0.12);
 }

 body {
 font-family: 'Cairo', 'Segoe UI', sans-serif;
 background: var(--sand);
 color: var(--ink);
 min-height: 100vh;
 overflow-x: hidden;
 }

 ::-webkit-scrollbar { width: 10px; height: 10px; }
 ::-webkit-scrollbar-track { background: var(--sand-dk); border-radius: 5px; }
 ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--clay) 0%, var(--clay-dk) 100%); border-radius: 5px; border: 2px solid var(--sand-dk); }
 ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--clay-lt) 0%, var(--clay) 100%); }

 /* 
 SCREENS SYSTEM
 */
 .screen { display: none; }
 .screen.active { display: block; }

 /* 
 SCREEN 1: إنشاء متجر جديد
 */
 .setup-screen {
 min-height: 100vh;
 background: linear-gradient(135deg, #8B6F5E 0%, #3D2B1F 100%);
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 flex-direction: column;
 gap: 20px;
 }

 .setup-tabs {
 display: flex;
 gap: 12px;
 margin-bottom: 0;
 }

 .setup-tab {
 padding: 12px 32px;
 border-radius: 12px 12px 0 0;
 border: none;
 font-family: 'Cairo', sans-serif;
 font-size: 1em;
 font-weight: 700;
 cursor: pointer;
 background: rgba(255,255,255,0.1);
 color: rgba(255,255,255,0.6);
 transition: all 0.3s;
 }

 .setup-tab.active {
 background: var(--white);
 color: var(--clay);
 }

 .setup-box {
 background: var(--white);
 border-radius: 0 16px 16px 16px;
 padding: 40px;
 box-shadow: 0 20px 60px rgba(0,0,0,0.3);
 max-width: 480px;
 width: 100%;
 animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
 }

 @keyframes slideUp {
 from { transform: translateY(30px); opacity: 0; }
 to { transform: translateY(0); opacity: 1; }
 }

 .setup-header {
 text-align: center;
 margin-bottom: 30px;
 }

 .setup-logo { font-size: 3em; margin-bottom: 12px; animation: bounce 2s infinite; }

 @keyframes bounce {
 0%, 100% { transform: translateY(0); }
 50% { transform: translateY(-8px); }
 }

 .setup-header h1 { font-size: 1.7em; color: var(--ink); font-weight: 900; margin-bottom: 6px; }
 .setup-header p { color: var(--ink-soft); font-size: 0.9em; }

 .setup-panel { display: none; }
 .setup-panel.active { display: block; animation: fadeIn 0.3s ease; }

 @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

 /* 
 SCREEN 2: تسجيل الدخول (مدير / موظف)
 */
 .login-screen {
 min-height: 100vh;
 background: linear-gradient(135deg, #8B6F5E 0%, #3D2B1F 100%);
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 flex-direction: column;
 gap: 20px;
 }

 .login-tabs {
 display: flex;
 gap: 12px;
 }

 .login-tab {
 padding: 12px 32px;
 border-radius: 12px 12px 0 0;
 border: none;
 font-family: 'Cairo', sans-serif;
 font-size: 1em;
 font-weight: 700;
 cursor: pointer;
 background: rgba(255,255,255,0.1);
 color: rgba(255,255,255,0.6);
 transition: all 0.3s;
 }

 .login-tab.active {
 background: var(--white);
 color: var(--clay);
 }

 .login-box {
 background: var(--white);
 border-radius: 0 16px 16px 16px;
 padding: 40px;
 box-shadow: 0 20px 60px rgba(0,0,0,0.3);
 max-width: 420px;
 width: 100%;
 animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
 }

 .login-header { text-align: center; margin-bottom: 28px; }
 .login-logo { font-size: 3em; margin-bottom: 12px; animation: bounce 2s infinite; }
 .login-header h1 { font-size: 1.7em; color: var(--ink); font-weight: 900; margin-bottom: 6px; }
 .login-header p { color: var(--ink-soft); font-size: 0.9em; }

 .login-form { display: none; }
 .login-form.active { display: block; animation: fadeIn 0.3s ease; }

 .login-link {
 text-align: center;
 margin-top: 16px;
 }

 .login-link a {
 color: var(--clay);
 font-weight: 600;
 cursor: pointer;
 text-decoration: none;
 font-size: 0.9em;
 }

 .login-link a:hover { color: var(--clay-dk); }

 /* 
 SHARED FORM STYLES
 */
 .form-group { margin-bottom: 16px; }

 .form-group label {
 display: block;
 margin-bottom: 7px;
 color: var(--ink-mid);
 font-weight: 600;
 font-size: 0.88em;
 }

 .form-group input,
 .form-group select,
 .form-group textarea {
 width: 100%;
 padding: 11px 14px;
 border: 2px solid var(--border);
 border-radius: 9px;
 font-size: 0.93em;
 font-family: 'Cairo', sans-serif;
 color: var(--ink);
 background: var(--white);
 transition: all 0.3s;
 }

 .form-group input:focus,
 .form-group select:focus,
 .form-group textarea:focus {
 outline: none;
 border-color: var(--clay);
 box-shadow: 0 0 0 3px rgba(139,111,94,0.2);
 }

 .form-group input::placeholder { color: #B0A090; }
 .form-group textarea { resize: vertical; min-height: 80px; }

 .form-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
 gap: 16px;
 }

 .error-msg {
 background: rgba(224,92,92,0.1);
 color: var(--rose);
 padding: 11px 14px;
 border-radius: 8px;
 margin-bottom: 16px;
 font-size: 0.88em;
 border-right: 4px solid var(--rose);
 display: none;
 }

 .error-msg.show { display: block; animation: fadeIn 0.3s ease; }

 /* 
 BUTTONS
 */
 .btn {
 padding: 10px 18px;
 border: none;
 border-radius: 9px;
 font-family: 'Cairo', sans-serif;
 font-size: 0.92em;
 font-weight: 700;
 cursor: pointer;
 transition: all 0.3s;
 }

 .btn-primary {
 background: linear-gradient(135deg, var(--clay) 0%, var(--clay-dk) 100%);
 color: white;
 box-shadow: 0 4px 15px rgba(212,165,116,0.3);
 }

 .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }

 .btn-success { background: linear-gradient(135deg, var(--green) 0%, #059669 100%); color: white; }
 .btn-success:hover { filter: brightness(1.1); transform: translateY(-2px); }

 .btn-danger { background: linear-gradient(135deg, var(--rose) 0%, var(--rose-dk) 100%); color: white; }
 .btn-danger:hover { filter: brightness(1.1); }

 .btn-secondary { background: var(--sand-dk); color: var(--ink-mid); }
 .btn-secondary:hover { background: var(--border); }

 .btn-full { width: 100%; padding: 13px; font-size: 1em; }

 .btn-small { padding: 5px 12px; font-size: 0.82em; }

 .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

 .login-btn {
 width: 100%;
 padding: 13px;
 background: linear-gradient(135deg, #8B6F5E 0%, #2A1F1A 100%);
 color: #F5F0EA;
 border: none;
 border-radius: 10px;
 font-family: 'Cairo', sans-serif;
 font-size: 1em;
 font-weight: 700;
 cursor: pointer;
 margin-top: 8px;
 transition: all 0.3s;
 box-shadow: 0 6px 20px rgba(139,111,94,0.4);
 position: relative;
 overflow: hidden;
 }

 .login-btn::before {
 content: '';
 position: absolute;
 top: 50%; left: 50%;
 width: 0; height: 0;
 background: rgba(255,255,255,0.3);
 border-radius: 50%;
 transform: translate(-50%, -50%);
 transition: width 0.6s, height 0.6s;
 }

 .login-btn:hover::before { width: 300px; height: 300px; }
 .login-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

 /* 
 SCREEN 3: التطبيق الرئيسي
 */
 .app-container {
 display: none;
 min-height: 100vh;
 background: var(--sand);
 }

 .app-container.active { display: flex; }

 /* SIDEBAR */
 .sidebar {
 width: 33.33%;
 max-width: 350px;
 background: linear-gradient(180deg, #3D2B1F 0%, #2A1F1A 100%);
 color: white;
 position: fixed;
 right: 0; top: 0;
 height: 100vh;
 overflow: hidden;
 z-index: 100;
 transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
 transform: translateX(100%);
 display: flex;
 flex-direction: column;
 }

 .sidebar.visible {
 transform: translateX(0);
 box-shadow: -4px 0 20px rgba(0,0,0,0.3);
 }

 .sidebar-header {
 padding: 20px 16px;
 border-bottom: 1px solid rgba(255,255,255,0.1);
 text-align: center;
 flex-shrink: 0;
 }

 .sidebar-shop-name { font-size: 1.1em; font-weight: 900; color: var(--clay-lt); margin-bottom: 4px; }
 .sidebar-user { font-size: 0.85em; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
 .sidebar-role {
 font-size: 0.75em;
 background: rgba(212,165,116,0.3);
 color: var(--clay-lt);
 display: inline-block;
 padding: 3px 8px;
 border-radius: 12px;
 margin-top: 6px;
 }

 .sidebar-nav { list-style: none; padding: 20px 0; flex-grow: 1; overflow-y: auto; }
 .sidebar-nav li { margin-bottom: 2px; }

 .sidebar-nav a {
 display: flex;
 align-items: center;
 gap: 12px;
 padding: 13px 20px;
 color: rgba(255,255,255,0.7);
 text-decoration: none;
 font-weight: 600;
 cursor: pointer;
 border-right: 4px solid transparent;
 transition: all 0.3s;
 font-size: 0.93em;
 }

 .sidebar-nav a:hover { background: rgba(255,255,255,0.08); color: white; padding-right: 24px; }
 .sidebar-nav a.active { background: rgba(139,111,94,0.2); color: white; border-right-color: var(--clay-lt); }

 .sidebar-logout {
 padding: 12px 16px;
 background: rgba(224,92,92,0.15);
 color: #FFB3B3;
 border: 2px solid rgba(224,92,92,0.3);
 border-radius: 8px;
 font-family: 'Cairo', sans-serif;
 cursor: pointer;
 font-weight: 600;
 transition: all 0.3s;
 width: calc(100% - 32px);
 margin: 16px auto;
 display: block;
 }

 .sidebar-logout:hover { background: var(--rose); color: white; border-color: var(--rose); }

 /* MENU TOGGLE */
 .menu-toggle {
 display: flex;
 align-items: center;
 justify-content: center;
 position: fixed;
 top: 20px; right: 20px;
 width: 50px; height: 50px;
 background: var(--clay);
 border: none;
 border-radius: 12px;
 color: white;
 font-size: 1.5em;
 cursor: pointer;
 z-index: 150;
 box-shadow: 0 6px 20px rgba(93,64,51,0.35);
 transition: all 0.3s;
 }

 .menu-toggle:hover { background: var(--clay-dk); transform: translateY(-2px); }

 /* MAIN CONTENT */
 .main-content {
 flex: 1;
 padding: 30px;
 padding-right: 80px;
 overflow-y: auto;
 height: 100vh;
 transition: margin-right 0.4s cubic-bezier(0.34,1.56,0.64,1);
 margin-right: 0;
 }

 .main-content.sidebar-open {
 margin-right: min(33.33%, 350px);
 }

 /* PAGES */
 .page { display: none; }
 .page.active { display: block; animation: fadeIn 0.3s ease; }

 .page-header { margin-bottom: 28px; }
 .page-title { font-size: 2em; color: var(--ink); font-weight: 900; margin-bottom: 6px; }
 .page-subtitle { color: var(--ink-soft); font-size: 0.93em; }

 /* PANELS */
 .panel {
 background: var(--white);
 border-radius: 16px;
 padding: 26px;
 box-shadow: 0 4px 20px var(--shadow);
 border: 1px solid var(--border);
 margin-bottom: 22px;
 }

 .panel-title {
 font-size: 1.15em;
 color: var(--ink);
 font-weight: 700;
 margin-bottom: 20px;
 display: flex;
 align-items: center;
 gap: 10px;
 padding-bottom: 12px;
 border-bottom: 2px solid var(--sand-dk);
 }

 .panel-title::before {
 content: '';
 width: 5px; height: 20px;
 background: linear-gradient(180deg, var(--clay) 0%, var(--clay-dk) 100%);
 border-radius: 3px;
 }

 /* STAT CARDS */
 .grid-2 {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
 gap: 18px;
 }

 .stat-card {
 background: linear-gradient(135deg, #F5F0EA 0%, #E8E0D4 100%);
 border-radius: 14px;
 padding: 22px;
 border-left: 4px solid var(--clay);
 text-align: center;
 transition: all 0.3s;
 }

 .stat-card:hover { transform: translateY(-6px); box-shadow: 0 10px 25px rgba(166,99,79,0.2); }
 .stat-icon { font-size: 2.2em; margin-bottom: 10px; }
 .stat-label { color: var(--ink-soft); font-size: 0.88em; margin-bottom: 6px; font-weight: 600; }
 .stat-value { font-size: 1.8em; color: var(--ink); font-weight: 900; }

 /* TABLES */
 .table-wrapper { overflow-x: auto; border-radius: 10px; }

 table { width: 100%; border-collapse: collapse; font-size: 0.88em; }

 thead th {
 background: linear-gradient(135deg, #8B6F5E 0%, #3D2B1F 100%);
 color: #F5F0EA;
 padding: 12px 13px;
 text-align: right;
 font-size: 0.87em;
 font-weight: 600;
 }

 thead th:first-child { border-radius: 0 8px 0 0; }
 thead th:last-child { border-radius: 8px 0 0 0; }

 tbody tr { border-bottom: 1px solid var(--sand-dk); transition: background 0.2s; }
 tbody tr:hover { background: rgba(200,132,90,0.06); }
 tbody td { padding: 11px 13px; color: var(--ink-mid); }

 .empty-state { text-align: center; color: var(--ink-soft); padding: 30px; font-size: 0.92em; }
 .empty-state-icon { font-size: 2.5em; margin-bottom: 10px; }

 /* SALES */
 .sales-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 20px;
 }

 .search-wrapper { position: relative; }

 .search-input {
 width: 100%;
 padding: 12px 16px;
 border: 2px solid var(--border);
 border-radius: 10px;
 font-size: 0.95em;
 font-family: 'Cairo', sans-serif;
 }

 .search-input:focus { outline: none; border-color: var(--clay); box-shadow: 0 0 0 3px rgba(139,111,94,0.2); }

 .search-results {
 position: absolute;
 top: 100%; right: 0; left: 0;
 background: var(--white);
 border: 2px solid var(--clay);
 border-radius: 10px;
 box-shadow: 0 10px 30px var(--shadow);
 z-index: 50;
 max-height: 300px;
 overflow-y: auto;
 display: none;
 }

 .search-results.active { display: block; }

 .search-item {
 padding: 12px 16px;
 cursor: pointer;
 border-bottom: 1px solid var(--sand-dk);
 transition: background 0.2s;
 }

 .search-item:hover { background: var(--sand); }
 .search-item-name { font-weight: 700; color: var(--ink); font-size: 0.95em; }
 .search-item-info { font-size: 0.82em; color: var(--ink-soft); margin-top: 3px; }

 .price-block {
 display: flex;
 align-items: center;
 justify-content: space-between;
 background: linear-gradient(135deg, var(--clay) 0%, var(--clay-dk) 100%);
 color: white;
 padding: 16px 20px;
 border-radius: 12px;
 margin: 16px 0;
 }

 .price-label { font-weight: 700; font-size: 1em; }
 .price-amount { font-size: 1.8em; font-weight: 900; }

 /* TOAST */
 .toast {
 position: fixed;
 bottom: 28px;
 left: 50%;
 transform: translateX(-50%) translateY(120px);
 background: var(--ink);
 color: white;
 padding: 13px 24px;
 border-radius: 12px;
 font-size: 0.93em;
 font-weight: 600;
 z-index: 9999;
 transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
 box-shadow: 0 6px 20px rgba(0,0,0,0.3);
 pointer-events: none;
 }

 .toast.show { transform: translateX(-50%) translateY(0); }
 .toast.success { background: linear-gradient(135deg, var(--green) 0%, #059669 100%); }
 .toast.error { background: linear-gradient(135deg, var(--rose) 0%, var(--rose-dk) 100%); }

 /* RESPONSIVE */
 @media (max-width: 768px) {
 .main-content { padding: 20px; padding-right: 20px; padding-top: 70px; }
 .sales-grid { grid-template-columns: 1fr; }
 .form-grid { grid-template-columns: 1fr; }
 .setup-box, .login-box { padding: 28px 20px; }
 }

 @media print {
 .sidebar, .menu-toggle, .btn-group { display: none !important; }
 }
 </style>

 <!-- شريط علوي -->

 <div style="color:rgba(245,233,211,0.9);font-size:0.82em;font-weight:700;letter-spacing:0.5px">Phoenix</div>

<script>
'use strict';

// 
// SUPABASE CONFIG
//
const SUPABASE_URL = (window.PHOENIX_CONFIG && window.PHOENIX_CONFIG.supabaseUrl) || '';
const SUPABASE_KEY = (window.PHOENIX_CONFIG && window.PHOENIX_CONFIG.supabaseKey) || '';

async function sbFetch(method, path, body = null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

//
// STORAGE HELPERS - Supabase
//
function getDB() {
 return _dbCache || {};
}

async function saveDB(db) {
 _dbCache = db;
 await _saveDBToSupabase(db);
}

async function _saveDBToSupabase(localDb) {
 try {
  for (const code of Object.keys(localDb)) {
   const res = await fetch(SUPABASE_URL + '/rest/v1/stores', {
    method: 'POST',
    headers: {
     'apikey': SUPABASE_KEY,
     'Authorization': 'Bearer ' + SUPABASE_KEY,
     'Content-Type': 'application/json',
     'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify({ code: code, data: localDb[code], updated_at: new Date().toISOString() })
   });
   if (!res.ok) {
    const err = await res.text();
    console.error('Supabase save error for ' + code + ':', err);
   }
  }
 } catch(e) { console.error('Supabase save error:', e); }
}

async function _loadDBFromFirebase() {
 try {
  const rows = await sbFetch('GET', 'stores?select=code,data');
  const db = {};
  if (rows) rows.forEach(r => { db[r.code] = r.data; });
  _dbCache = db;
  return db;
 } catch(e) {
  console.error('Supabase load error:', e);
  return {};
 }
}

function getSavedUser() {

function showToast(msg, type = 'success') {
 let t = document.getElementById('toast');
 if (!t) {
  t = document.createElement('div');
  t.id = 'toast';
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 24px;border-radius:12px;font-family:Cairo,sans-serif;font-size:0.95em;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none';
  document.body.appendChild(t);
 }
 t.textContent = msg;
 t.style.opacity = '1';
 if (type === 'error') t.style.background = 'linear-gradient(135deg,#e74c3c,#c0392b)';
 else t.style.background = 'linear-gradient(135deg,#2ecc71,#27ae60)';
 setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

async function loginUnified() {
 const name = document.getElementById('unifiedLoginName').value.trim();
 const rawPassword = document.getElementById('unifiedLoginPassword').value;

 if (!name || !rawPassword) {
 showLoginError(' أدخل الاسم وكلمة المرور');
 return;
 }

 const code = selectedStoreCode || (shopData && shopData.shopCode);
 if (!code) {
 showLoginError(' خطأ في اختيار المتجر — ارجع واختر متجرك');
 return;
 }

 const db = getDB();
 const shop = db[code];
 if (!shop) {
 showLoginError(' المتجر غير موجود');
 return;
 }

 // عمل hash للباسورد المدخول عشان يتطابق مع المحفوظ
 const hashedPassword = (typeof window.__sha256 === 'function')
  ? await window.__sha256(rawPassword)
  : rawPassword;

 // ===== تحقق: هل هو مدير؟ =====
 if (name === shop.managerName &&
   (hashedPassword === shop.managerPassword || rawPassword === shop.managerPassword)) {
 currentUser = {
  type: 'manager',
  name: shop.managerName,
  shopCode: code,
  shopName: shop.shopName
 };
 selectedStoreCode = code;
 localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
 shopData = shop;
 loadDataFromStorage();
 showToast(' أهلاً بك يا ' + currentUser.name);
 window.location.href = 'pos.html';
 return;
 }

 // ===== تحقق: هل هو موظف؟ =====
 const emp = (shop.employees || []).find(e =>
  e.name === name &&
  (e.password === hashedPassword || e.password === rawPassword)
 );
 if (emp) {
 emp.status = 'نشط';
 emp.lastLogin = new Date().toLocaleString('ar-EG');
 currentUser = {
  type: 'employee',
  name: emp.name,
  shopCode: code,
  shopName: shop.shopName,
  id: emp.id
 };
 localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
 shopData = shop;
 saveDB(db);
 loadDataFromStorage();
 showToast(' أهلاً بك يا ' + emp.name);
 window.location.href = 'pos.html';
 return;
 }

 // ===== فشل الدخول =====
 showLoginError(' الاسم أو كلمة المرور غير صحيحة');
}

function addProduct() {
 const name = document.getElementById('prodName').value.trim();
 const qty = parseInt(document.getElementById('prodQty').value) || 0;
 const size = parseFloat(document.getElementById('prodSize').value) || 0;
 const costPrice = parseFloat(document.getElementById('prodCostPrice').value) || 0;
 const salePrice = parseFloat(document.getElementById('prodSalePrice').value) || 0;

 if (!name || qty <= 0 || size <= 0 || salePrice <= 0) {
 showToast(' أدخل جميع البيانات بشكل صحيح', 'error'); return;
 }

 // البحث عن منتج بنفس الاسم
 const existingProduct = products.find(p => p.name === name);
 
 if (existingProduct) {
 // إضافة الكمية للمنتج الموجود
 existingProduct.qty += qty;
 showToast(' تم إضافة ' + qty + ' وحدة إلى ' + name);
 } else {
 // إنشاء منتج جديد
 const newCode = 'PRD' + String(products.length + 1).padStart(4, '0');
 const product = {
 id: Date.now(),
 name,
 code: newCode,
 qty,
 size: size + ' متر مربع',
 costPrice,
 salePrice,
 createdAt: new Date().toLocaleString('ar-EG')
 };
 products.push(product);
 showToast(' تمت إضافة المنتج بنجاح - الكود: ' + newCode);
 }

 saveDataToStorage();
 renderProductsTable();
 // تنظيف الحقول
 ['prodName','prodQty','prodSize','prodCostPrice','prodSalePrice'].forEach(id => document.getElementById(id).value = '');
 document.getElementById('prodCode').value = '';
}

function editProduct(id) {
 const product = products.find(p => p.id === id);
 if (!product) return;

 const name = prompt('اسم المنتج:', product.name);
 if (name === null) return;

 const qty = prompt('الكمية:', product.qty);
 if (qty === null) return;

 const size = prompt('المقاس (متر مربع):', product.size.replace(' متر مربع', ''));
 if (size === null) return;

 const costPrice = prompt('سعر التكلفة:', product.costPrice);
 if (costPrice === null) return;

 const salePrice = prompt('سعر البيع:', product.salePrice);
 if (salePrice === null) return;

 // التحقق من البيانات
 if (!name || !qty || !size || !costPrice || !salePrice) {
 showToast(' أدخل جميع البيانات بشكل صحيح', 'error');
 return;
 }

 // تحديث المنتج
 product.name = name.trim();
 product.qty = Math.max(0, parseInt(qty) || 0);
 product.size = size + ' متر مربع';
 product.costPrice = parseFloat(costPrice) || 0;
 product.salePrice = parseFloat(salePrice) || 0;

 saveDataToStorage();
 renderProductsTable();
 showToast(' تم تعديل المنتج بنجاح');
}

function addToInvoice(productId) {
 const product = products.find(p => p.id === productId);
 if (!product || product.qty === 0) { showToast(' هذا المنتج غير متوفر', 'error'); return; }

 const existing = currentInvoice.find(i => i.productId === productId);
 if (existing) {
 if (existing.qty >= product.qty) {
 showToast(' وصلت للحد الأقصى المتاح (' + product.qty + ')', 'error');
 return;
 }
 existing.qty += 1;
 } else {
 currentInvoice.push({
 productId,
 name: product.name,
 code: product.code,
 size: product.size,
 price: product.salePrice,
 costPrice: product.costPrice,
 qty: 1
 });
 }

 renderInvoiceTable();
 showToast('✅ تمت إضافة ' + product.name);
}

function renderInvoiceTable() {
 const tbody = document.getElementById('invoiceItems');
 const emptyState = document.getElementById('emptyInvoiceState');
 const table = document.getElementById('invoiceTable');

 if (currentInvoice.length === 0) {
 tbody.innerHTML = '';
 table.style.display = 'none';
 emptyState.style.display = 'block';
 document.getElementById('invoiceTotal').textContent = '0.00';
 return;
 }

 table.style.display = '';
 emptyState.style.display = 'none';

 let total = 0;
 tbody.innerHTML = currentInvoice.map((item, idx) => {
 const lineTotal = item.price * item.qty;
 total += lineTotal;
 const prod = products.find(p => p.id === item.productId);
 const maxQty = prod ? prod.qty : 9999;
 return `
 <tr>
 <td><strong>${item.name}</strong><div style="font-size:0.75em;color:var(--ink-soft)">${item.size||''}</div></td>
 <td>
 <div style="display:flex;align-items:center;gap:5px;justify-content:center">
 <button onclick="changeInvoiceQty(${idx},-1)" style="width:28px;height:28px;border:2px solid var(--clay);border-radius:7px;background:white;color:var(--clay);font-size:1.1em;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">−</button>
 <input type="number" value="${item.qty}" min="1" max="${maxQty}" onchange="updateInvoiceQty(${idx},this.value)" oninput="this.style.width=(this.value.length+2)+'ch'" style="width:${String(item.qty).length+2}ch;text-align:center;font-weight:700;font-size:0.95em;border:2px solid var(--border);border-radius:7px;padding:3px 4px;font-family:Cairo,sans-serif;color:var(--ink);min-width:40px;max-width:80px">
 <button onclick="changeInvoiceQty(${idx},1)" ${item.qty >= maxQty ? 'disabled' : ''} style="width:28px;height:28px;border:2px solid var(--clay);border-radius:7px;background:var(--clay);color:white;font-size:1.1em;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;${item.qty >= maxQty ? 'opacity:0.4;cursor:not-allowed' : ''}">+</button>
 </div>
 </td>
 <td>${item.price.toFixed(2)}</td>
 <td style="font-weight:700;color:var(--clay)">${lineTotal.toFixed(2)}</td>
 <td><button class="btn btn-danger btn-small" onclick="removeFromInvoice(${idx})" style="padding:4px 8px">🗑</button></td>
 </tr>
 `;
 }).join('');

 document.getElementById('invoiceTotal').textContent = total.toFixed(2);
}

function updateInvoiceQty(idx, val) {
 const n = parseInt(val) || 0;
 if (n <= 0) removeFromInvoice(idx);
 else { currentInvoice[idx].qty = n; renderInvoiceTable(); }
}

function changeInvoiceQty(idx, delta) {
 const item = currentInvoice[idx];
 if (!item) return;
 const prod = products.find(p => p.id === item.productId);
 const maxQty = prod ? prod.qty : 9999;
 const newQty = item.qty + delta;
 if (newQty <= 0) {
 removeFromInvoice(idx);
 return;
 }
 if (newQty > maxQty) {
 showToast(' وصلت للحد الأقصى المتاح (' + maxQty + ')', 'error');
 return;
 }
 item.qty = newQty;
 renderInvoiceTable();
}

function removeFromInvoice(idx) {
 currentInvoice.splice(idx, 1);
 renderInvoiceTable();
}

function clearInvoice() {
 if (currentInvoice.length === 0) return;
 if (!confirm('هل تريد مسح الفاتورة؟')) return;
 currentInvoice = [];
 renderInvoiceTable();
 showToast(' تم مسح الفاتورة');
}

function completeInvoice() {
 if (currentInvoice.length === 0) { showToast(' الفاتورة فارغة', 'error'); return; }

 // التحقق من توفر الكميات
 let missingProducts = [];
 for (let item of currentInvoice) {
 const prod = products.find(p => p.id === item.productId);
 if (!prod) {
 missingProducts.push(item.name + ' - غير موجود');
 } else if (prod.qty < item.qty) {
 missingProducts.push(item.name + ' - المتوفر: ' + prod.qty + ' والمطلوب: ' + item.qty);
 }
 }

 if (missingProducts.length > 0) {
 let errorMsg = ' المنتجات الناقصة:\n' + missingProducts.join('\n');
 showToast(errorMsg, 'error');
 return;
 }

 const total = currentInvoice.reduce((s, i) => s + i.price * i.qty, 0);
 const costs = currentInvoice.reduce((s, i) => s + i.costPrice * i.qty, 0);
 const profit = total - costs;

 const invoice = {
 id: 'INV-' + Date.now(),
 date: new Date().toISOString().split('T')[0],
 dateTime: new Date().toLocaleString('ar-EG'),
 employee: currentUser.name,
 employeeId: currentUser.id || 'manager',
 items: [...currentInvoice],
 total, costs, profit,
 paymentMethod: document.getElementById('paymentMethod').value,
 notes: document.getElementById('invoiceNotes').value,
 currency: shopData.currency
 };

 invoices.push(invoice);
 lastInvoice = invoice;

 transactions.push({
 type: 'invoice', id: invoice.id,
 date: invoice.dateTime, amount: total, profit,
 employee: invoice.employee, paymentMethod: invoice.paymentMethod
 });

 const emp = employees.find(e => e.id === currentUser.id || e.name === currentUser.name);
 if (emp) { emp.invoices++; emp.totalSales = (emp.totalSales || 0) + total; }

 currentInvoice.forEach(item => {
 const prod = products.find(p => p.id === item.productId);
 if (prod) prod.qty = Math.max(0, prod.qty - item.qty);
 });

 saveDataToStorage();
 currentInvoice = [];
 renderInvoiceTable();
 document.getElementById('invoiceNotes').value = '';
 renderProductGrid();

 showToast(' تمت الفاتورة بنجاح');
 printInvoiceData(invoice);

 if (currentUser.type === 'manager') updateAllReports();
}

function printLastInvoice() {

 : products;

 if (list.length === 0) {
 grid.innerHTML = '<p style="color:var(--ink-soft);font-size:0.88em;grid-column:1/-1;text-align:center;padding:20px">لا توجد منتجات</p>';

 }

 grid.innerHTML = list.map(p => `
 <div onclick="addToReturnCart(${p.id})"
 style="
 background:var(--white);
 border:2px solid var(--border);
 border-radius:12px;
 padding:12px 10px;
 cursor:pointer;
 text-align:center;
 transition:all 0.2s;
 user-select:none;
 "
 onmouseover="this.style.borderColor='var(--teal)'"
 onmouseout="this.style.borderColor='var(--border)'"
 >
 <div style="font-weight:700;font-size:0.88em;color:var(--ink);margin-bottom:5px;line-height:1.3">${p.name}</div>

 renderReturnProductGrid(q);
}

function addToReturnCart(productId) {
 const product = products.find(p => p.id === productId);
 if (!product) return;

 const existing = currentReturnCart.find(i => i.productId === productId);
 if (existing) {
 existing.qty += 1;
 } else {
 currentReturnCart.push({
 productId,
 name: product.name,
 code: product.code,
 price: product.salePrice,
 qty: 1
 });
 }

 renderReturnCartTable();
 showToast('✅ تمت إضافة ' + product.name);
}

function renderReturnCartTable() {
 const tbody = document.getElementById('returnCartItems');
 const emptyState = document.getElementById('emptyReturnState');
 const table = document.getElementById('returnCartTable');

 if (currentReturnCart.length === 0) {
 tbody.innerHTML = '';
 table.style.display = 'none';
 emptyState.style.display = 'block';
 document.getElementById('returnCartTotal').textContent = '0.00';
 return;
 }

 table.style.display = '';
 emptyState.style.display = 'none';

 let total = 0;
 tbody.innerHTML = currentReturnCart.map((item, idx) => {
 const lineTotal = item.price * item.qty;
 total += lineTotal;
 return `
 <tr>
 <td><strong>${item.name}</strong></td>
 <td>
 <div style="display:flex;align-items:center;gap:5px;justify-content:center">
 <button onclick="changeReturnCartQty(${idx},-1)" style="width:28px;height:28px;border:2px solid var(--rose);border-radius:7px;background:white;color:var(--rose);font-size:1.1em;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">−</button>
 <input type="number" value="${item.qty}" min="1" onchange="updateReturnCartQty(${idx},this.value)" oninput="this.style.width=(this.value.length+2)+'ch'" style="width:${String(item.qty).length+2}ch;text-align:center;font-weight:700;font-size:0.95em;border:2px solid var(--border);border-radius:7px;padding:3px 4px;font-family:Cairo,sans-serif;color:var(--ink);min-width:40px;max-width:80px">
 <button onclick="changeReturnCartQty(${idx},1)" style="width:28px;height:28px;border:2px solid var(--rose);border-radius:7px;background:var(--rose);color:white;font-size:1.1em;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">+</button>
 </div>
 </td>
 <td>${item.price.toFixed(2)}</td>
 <td style="font-weight:700;color:var(--rose)">${lineTotal.toFixed(2)}</td>
 <td><button class="btn btn-danger btn-small" onclick="removeFromReturnCart(${idx})" style="padding:4px 8px">🗑</button></td>
 </tr>
 `;
 }).join('');

 document.getElementById('returnCartTotal').textContent = total.toFixed(2);
}

function updateReturnCartQty(idx, val) {
 const n = parseInt(val) || 0;
 if (n <= 0) removeFromReturnCart(idx);
 else { currentReturnCart[idx].qty = n; renderReturnCartTable(); }
}

function changeReturnCartQty(idx, delta) {
 const item = currentReturnCart[idx];
 if (!item) return;
 const newQty = item.qty + delta;
 if (newQty <= 0) {
 removeFromReturnCart(idx);
 return;
 }
 item.qty = newQty;
 renderReturnCartTable();
}

function removeFromReturnCart(idx) {
 currentReturnCart.splice(idx, 1);
 renderReturnCartTable();
}

function clearReturnCart() {
 if (currentReturnCart.length === 0) return;
 if (!confirm('هل تريد مسح سلة المرتجعات؟')) return;
 currentReturnCart = [];
 renderReturnCartTable();
 showToast(' تم مسح سلة المرتجعات');
}

 const returnInvoiceId = 'RET-' + Date.now();
 const total = currentReturnCart.reduce((s, i) => s + i.price * i.qty, 0);

 // إنشاء فاتورة مرتجع مجمّعة
 const returnInvoice = {
 id: returnInvoiceId,
 date,
 dateTime,
 employee: currentUser.name,

 items: currentReturnCart.map(i => ({ name: i.name, code: i.code, qty: i.qty, price: i.price })),
 total,
 reason,
 notes
 };

 // حفظ الفاتورة المجمّعة
 if (!shopData.returnInvoices) shopData.returnInvoices = [];
 shopData.returnInvoices.push(returnInvoice);

 // حفظ كل صنف منفرداً في returns (للتقارير)
 currentReturnCart.forEach(item => {

 reason,
 price: item.price,
 date,
 dateTime,
 employee: currentUser.name,
 employeeId: currentUser.id || 'manager',

 };
 returns.push(ret);
 transactions.push({ type: 'return', id: ret.id, date: ret.dateTime, amount: -(ret.price * ret.qty), employee: ret.employee });

 const emp = employees.find(e => e.id === currentUser.id || e.name === currentUser.name);
 if (emp) emp.returns = (emp.returns || 0) + ret.price * ret.qty;

 const prod = products.find(p => p.id === item.productId);
 if (prod) prod.qty += item.qty;
 });

 saveDataToStorage();
 // حفظ returnInvoices يدوياً
 const db = getDB();
 if (db[currentUser.shopCode]) {
 db[currentUser.shopCode].returnInvoices = shopData.returnInvoices;
 saveDB(db);
 }

 lastReturnInvoice = returnInvoice;

 renderReturnsTable();
 renderReturnProductGrid();

 currentReturnCart = [];

 document.getElementById('returnNotes').value = '';

 showToast(' تم تسجيل المرتجع بنجاح وتحديث المخزون');
 printReturnInvoiceData(returnInvoice);
 if (currentUser.type === 'manager') updateAllReports();
}

function exportExcel() {
 const currency = shopData ? shopData.currency : '';
 const shopName = shopData ? shopData.shopName : '';
 const now = new Date().toLocaleString('ar-EG');

 let csv = '\uFEFF'; // BOM for Arabic
 csv += `تقرير ${shopName} — ${now}\n\n`;
 csv += `إجمالي الإيرادات,${invoices.reduce((s,i)=>s+i.total,0).toFixed(2)} ${currency}\n`;
 csv += `إجمالي التكاليف,${invoices.reduce((s,i)=>s+(i.costs||0),0).toFixed(2)} ${currency}\n`;
 csv += `الربح الإجمالي,${(invoices.reduce((s,i)=>s+i.total,0)-invoices.reduce((s,i)=>s+(i.costs||0),0)).toFixed(2)} ${currency}\n`;
 csv += `المرتجعات,${returns.reduce((s,r)=>s+r.price*r.qty,0).toFixed(2)} ${currency}\n\n`;

 csv += `رقم الفاتورة,التاريخ,الموظف,المبلغ,طريقة الدفع\n`;
 invoices.slice().reverse().forEach(inv => {
 const pay = inv.paymentMethod === 'cash' ? 'كاش' : inv.paymentMethod === 'card' ? 'بطاقة' : 'محفظة';
 csv += `${inv.id},${inv.dateTime},${inv.employee},${inv.total.toFixed(2)} ${currency},${pay}\n`;
 });

 const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url;
 a.download = `تقرير-${shopName}-${new Date().toISOString().split('T')[0]}.csv`;
 a.click();
 URL.revokeObjectURL(url);
 showToast('تم تصدير ملف Excel بنجاح');
}

function backupData() {
 const db = getDB();
 const backup = { version: '3.0', date: new Date().toISOString(), data: db };
 const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a');

function restoreFromBackup() {
 const input = document.createElement('input');
 input.type = 'file';
 input.accept = '.json';
 input.onchange = e => {
 const reader = new FileReader();
 reader.onload = evt => {
 try {
 const backup = JSON.parse(evt.target.result);
 const db = getDB();
 Object.assign(db, backup.data);
 saveDB(db);
 showToast(' تمت الاستعادة — سيتم إعادة التحميل');
 setTimeout(() => location.reload(), 1500);
 } catch { showToast(' خطأ في الملف', 'error'); }
 };
 reader.readAsText(e.target.files[0]);
 };
 input.click();
}

function saveProfile() {
 const newPhone = document.getElementById('profilePhone').value;
 const newPassword = document.getElementById('profilePassword').value;
 const confirmPass = document.getElementById('profilePasswordConfirm').value;

 if (newPassword && newPassword !== confirmPass) {
 showToast(' كلمتا المرور غير متطابقتين', 'error');
 return;
 }

 const db = getDB();
 const shop = db[currentUser.shopCode];
 if (!shop) return;

 if (currentUser.type === 'manager') {
 // حفظ بيانات المتجر
 shop.shopName = document.getElementById('profileStoreName').value || shop.shopName;
 shop.currency = document.getElementById('profileStoreCurrency').value;
 shop.tax = parseFloat(document.getElementById('profileStoreTax').value) || 0;

 // حفظ بيانات المدير
 shop.managerPhone = newPhone;
 if (newPassword) shop.managerPassword = newPassword;

 // تحديث اسم المتجر في الـ sidebar
 currentUser.shopName = shop.shopName;
 localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
 updateSidebarInfo();
 } else {
 const emp = (shop.employees || []).find(e => e.id === currentUser.id || e.name === currentUser.name);
 if (emp) {
 emp.phone = newPhone;
 if (newPassword) emp.password = newPassword;
 }
 }

 db[currentUser.shopCode] = shop;
 saveDB(db);
 shopData = shop;
 document.getElementById('profilePassword').value = '';
 document.getElementById('profilePasswordConfirm').value = '';
 showToast(' تم حفظ البيانات بنجاح');
}

function loadEmployeePermissions() {

 document.getElementById('permissionsContainer').style.display = 'block';

 // تحميل صلاحيات الموظف

 ['sales','returns','dashboard','inventory','employees','reports','settings','shift'].forEach(p => {

 });
}

function highlightPerm(key) {
 const el    = document.getElementById('perm-' + key);
 const label = document.getElementById('perm-label-' + key);
 if (!el || !label) return;
 label.style.borderColor = el.checked ? 'var(--clay)' : 'var(--border)';
 label.style.background  = el.checked ? 'rgba(139,111,94,0.08)' : '';
}

function selectAllPerms(val) {
 ['sales','returns','dashboard','inventory','employees','reports','settings','shift'].forEach(p => {

 });
}

function updateEmployeeStats() {
 const empInv = invoices.filter(i => i.employee === currentUser.name);
 const empRet = returns.filter(r => r.employee === currentUser.name);
 const total = empInv.reduce((s, i) => s + i.total, 0);
 const retTot = empRet.reduce((s, r) => s + r.price * r.qty, 0);
 const avg = empInv.length > 0 ? total / empInv.length : 0;

 document.getElementById('empInvoiceCount').textContent = empInv.length;
 document.getElementById('empSalesTotal').textContent = total.toFixed(2);
 document.getElementById('empReturnsTotal').textContent = retTot.toFixed(2);
 document.getElementById('empAvgInvoice').textContent = avg.toFixed(2);
}
